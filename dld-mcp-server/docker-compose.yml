services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dld
      POSTGRES_PASSWORD: dld_pass
      POSTGRES_DB: dld_db
    volumes:
      - dld-pgdata:/var/lib/postgresql/data
    networks:
      - dld-net

  data-service:
    build: ./data-service
    ports:
      - "8000:8000"  
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://dld:dld_pass@postgres:5432/dld_db
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      SEARCH_PAGE_SIZE: ${SEARCH_PAGE_SIZE:-25}
      SCRAPER_MAX_LISTINGS: ${SCRAPER_MAX_LISTINGS:-90}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-3}
      SCRAPER_REQUEST_DELAY: ${SCRAPER_REQUEST_DELAY:-0.5}
      SCRAPER_REFRESH_DAYS: ${SCRAPER_REFRESH_DAYS:-7}
      SCRAPER_OUTPUT: ${SCRAPER_OUTPUT:-db}
      OUTPUT_CSV_PATH: ${OUTPUT_CSV_PATH:-data/active_dld.csv}
      LAST_RUN_PATH: ${LAST_RUN_PATH:-last_run.json}
    networks:
      - dld-net

  mcp-server:
    build: ./mcp-server
    depends_on:
      - data-service
    ports:
      - "8001:8001"
    environment:
      DATA_SERVICE_URL: http://data-service:8000
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY}
    networks:
      - dld-net

volumes:
  dld-pgdata:
    name: dld-pgdata

networks:
  dld-net:
    driver: bridge