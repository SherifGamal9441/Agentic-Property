<svg viewBox="0 -40 1020 1050" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#060a14"/>
    </radialGradient>

    <!-- Glow filter for nodes -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Softer glow for edges -->
    <filter id="edgeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1c2740"/>
    </pattern>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="-40" width="1020" height="1050" fill="url(#bgGrad)"/>
  <rect x="0" y="-40" width="1020" height="1050" fill="url(#dots)"/>

  <!-- Title -->
  <text x="510" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">
    Property Search Agent — Architecture
  </text>

  <!-- ===================== EDGES ===================== -->
  <g fill="none" stroke="#5aa9e6" stroke-width="2" filter="url(#edgeGlow)" opacity="0.85">
    <path d="M500,92 L500,140" marker-end="url(#arrow)"/>
    <path d="M500,198 L500,260" marker-end="url(#arrow)"/>
    <path d="M570,170 C 900,175 900,858 662,858" marker-end="url(#arrow)"/>
    <path d="M600,290 C 960,295 960,948 596,948" marker-end="url(#arrow)"/>
    <path d="M500,318 L500,380" marker-end="url(#arrow)"/>
    <path d="M418,438 C 350,470 300,472 268,500" marker-end="url(#arrow)"/>
    <path d="M582,438 C 650,470 710,472 742,500" marker-end="url(#arrow)"/>
    <path d="M260,558 L260,620" marker-end="url(#arrow)"/>
    <path d="M342,528 C 500,600 600,600 678,528" marker-end="url(#arrow)"/>
    <path d="M260,678 L260,740" marker-end="url(#arrow)"/>
    <path d="M338,778 C 420,818 480,838 462,856" marker-end="url(#arrow)"/>
    <path d="M188,750 C 78,682 78,578 190,538" marker-end="url(#arrow)"/>
    <path d="M700,558 C 648,650 618,752 610,832" marker-end="url(#arrow)"/>
    <path d="M560,888 L560,916" marker-end="url(#arrow)"/>
  </g>

  <!-- ===================== EDGE LABELS ===================== -->
  <g font-size="12.5" font-weight="600">
    <g>
      <rect x="508" y="220" width="118" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="567" y="235" text-anchor="middle" fill="#93c5fd">property query</text>
    </g>
    <g>
      <rect x="600" y="90" width="120" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="660" y="105" text-anchor="middle" fill="#93c5fd">greeting / meta</text>
    </g>
    <g>
      <rect x="855" y="590" width="118" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="914" y="605" text-anchor="middle" fill="#fca5a5">out of scope ❌</text>
    </g>
    <g>
      <rect x="510" y="340" width="80" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="550" y="355" text-anchor="middle" fill="#86efac">relevant ✓</text>
    </g>
    <g>
      <rect x="270" y="450" width="118" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="329" y="465" text-anchor="middle" fill="#93c5fd">find properties</text>
    </g>
    <g>
      <rect x="600" y="450" width="140" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="670" y="465" text-anchor="middle" fill="#93c5fd">general question</text>
    </g>
    <g>
      <rect x="150" y="590" width="94" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="197" y="605" text-anchor="middle" fill="#86efac">has results</text>
    </g>
    <g>
      <rect x="455" y="565" width="98" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="504" y="580" text-anchor="middle" fill="#fca5a5">no results</text>
    </g>
    <g>
      <rect x="380" y="800" width="72" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="416" y="815" text-anchor="middle" fill="#86efac">passed ✓</text>
    </g>
    <g>
      <rect x="30" y="630" width="120" height="22" rx="11" fill="#0f1729" stroke="#233150"/>
      <text x="90" y="645" text-anchor="middle" fill="#fca5a5">needs retry 🔄</text>
    </g>
  </g>

  <!-- ===================== NODES ===================== -->

  <!-- START -->
  <g filter="url(#glow)">
    <circle cx="500" cy="60" r="32" fill="#00e5ff" stroke="#00b8d4" stroke-width="2.5"/>
  </g>
  <text x="500" y="65" text-anchor="middle" fill="#04202b" font-size="13" font-weight="800">START</text>

  <!-- memory -->
  <g filter="url(#glow)">
    <rect x="430" y="142" width="140" height="56" rx="14" fill="#131a2e" stroke="#536dfe" stroke-width="2.5"/>
  </g>
  <text x="500" y="176" text-anchor="middle" fill="#c7d2fe" font-size="15" font-weight="700">memory</text>

  <!-- query_relevancy -->
  <g filter="url(#glow)">
    <rect x="400" y="262" width="200" height="56" rx="14" fill="#131a2e" stroke="#ffab40" stroke-width="2.5"/>
  </g>
  <text x="500" y="296" text-anchor="middle" fill="#ffd8a8" font-size="14.5" font-weight="700">query_relevancy</text>

  <!-- query_understanding -->
  <g filter="url(#glow)">
    <rect x="390" y="382" width="220" height="56" rx="14" fill="#131a2e" stroke="#ffab40" stroke-width="2.5"/>
  </g>
  <text x="500" y="416" text-anchor="middle" fill="#ffd8a8" font-size="14.5" font-weight="700">query_understanding</text>

  <!-- query_routing -->
  <g filter="url(#glow)">
    <rect x="170" y="502" width="180" height="56" rx="14" fill="#131a2e" stroke="#69f0ae" stroke-width="2.5"/>
  </g>
  <text x="260" y="536" text-anchor="middle" fill="#bbf7d0" font-size="14.5" font-weight="700">query_routing</text>

  <!-- web_search -->
  <g filter="url(#glow)">
    <rect x="680" y="502" width="160" height="56" rx="14" fill="#131a2e" stroke="#e040fb" stroke-width="2.5"/>
  </g>
  <text x="760" y="536" text-anchor="middle" fill="#f3b8ff" font-size="14.5" font-weight="700">web_search</text>

  <!-- comparison_engine -->
  <g filter="url(#glow)">
    <rect x="160" y="622" width="200" height="56" rx="14" fill="#131a2e" stroke="#69f0ae" stroke-width="2.5"/>
  </g>
  <text x="260" y="656" text-anchor="middle" fill="#bbf7d0" font-size="14" font-weight="700">comparison_engine</text>

  <!-- reflection -->
  <g filter="url(#glow)">
    <rect x="180" y="742" width="160" height="56" rx="14" fill="#131a2e" stroke="#ff5252" stroke-width="2.5"/>
  </g>
  <text x="260" y="776" text-anchor="middle" fill="#ffc9c9" font-size="14.5" font-weight="700">reflection</text>

  <!-- answer_generation -->
  <g filter="url(#glow)">
    <rect x="460" y="832" width="200" height="56" rx="14" fill="#131a2e" stroke="#536dfe" stroke-width="2.5"/>
  </g>
  <text x="560" y="866" text-anchor="middle" fill="#c7d2fe" font-size="14" font-weight="700">answer_generation</text>

  <!-- END -->
  <g filter="url(#glow)">
    <circle cx="560" cy="950" r="32" fill="#ff4081" stroke="#f50057" stroke-width="2.5"/>
  </g>
  <text x="560" y="955" text-anchor="middle" fill="#2b0414" font-size="14" font-weight="800">END</text>

</svg>
